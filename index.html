<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ Mercado da Copa</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html{
scroll-behavior:smooth;
}

body{
background:#f8fafc;
}

.hero{
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1600');
background-size:cover;
background-position:center;
}

.loading{
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="bg-gradient-to-r from-green-700 via-green-600 to-yellow-500 text-white sticky top-0 z-50 shadow-lg">

<div class="max-w-7xl mx-auto flex justify-between items-center px-4 py-4">

<h1 class="text-2xl md:text-3xl font-black">
⚽ Mercado da Copa
</h1>

<button
onclick="abrirCarrinho()"
class="relative text-3xl">

🛒

<span
id="contadorCarrinho"
class="absolute -top-2 -right-2 bg-red-500 text-xs px-2 rounded-full">

0

</span>

</button>

</div>

</nav>

<!-- HERO -->

<section class="hero h-[350px] flex items-center justify-center text-center text-white">

<div>

<h2 class="text-5xl font-black mb-4">
Viva a Emoção da Copa
</h2>

<p class="text-xl">
Compre e venda itens históricos do futebol mundial
</p>

</div>

</section>

<!-- BUSCA -->

<section class="max-w-7xl mx-auto px-4 mt-8">

<div class="bg-white rounded-2xl shadow p-4">

<input
id="pesquisa"
type="text"
placeholder="🔍 Buscar produtos..."
class="w-full border rounded-xl p-4"
oninput="filtrarProdutos()">

</div>

</section>

<!-- PRODUTOS -->

<section class="max-w-7xl mx-auto p-4">

<h2 class="text-2xl font-bold mb-6">
Produtos Disponíveis
</h2>

<div
id="produtos"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

<div class="loading bg-white h-80 rounded-2xl"></div>
<div class="loading bg-white h-80 rounded-2xl"></div>
<div class="loading bg-white h-80 rounded-2xl"></div>
<div class="loading bg-white h-80 rounded-2xl"></div>

</div>

</section>

<!-- CARRINHO -->

<div
id="carrinho"
class="fixed top-0 right-[-400px] w-[350px] h-full bg-white shadow-2xl transition-all duration-300 z-50">

<div class="flex justify-between items-center p-4 border-b">

<h2 class="font-bold text-xl">
🛒 Carrinho
</h2>

<button
onclick="fecharCarrinho()"
class="text-2xl">

✖

</button>

</div>

<div id="itensCarrinho" class="p-4">

<p class="text-gray-500">
Nenhum item.
</p>

</div>

</div>

<!-- TOAST -->

<div
id="toast"
class="hidden fixed bottom-5 right-5 bg-green-600 text-white px-4 py-3 rounded-xl shadow-lg">

Produto adicionado ao carrinho!

</div>

<!-- FOOTER -->

<footer class="bg-slate-900 text-white mt-12">

<div class="max-w-7xl mx-auto p-8 text-center">

<h3 class="text-2xl font-bold mb-2">
⚽ Mercado da Copa
</h3>

<p>
Marketplace esportivo desenvolvido com Node.js e Supabase
</p>

</div>

</footer>

<script>

const API =
"https://backend-copa-5nkj.vercel.app";

let produtos = [];
let carrinho = [];

async function carregarProdutos(){

try{

const response =
await fetch(`${API}/produtos`);

if(response.ok){

produtos =
await response.json();

}

if(!produtos || produtos.length===0){

produtos = [

{
id:1,
nome:"Camisa Brasil 2002",
descricao:"Camisa da seleção campeã do mundo.",
categoria:"Camisas",
preco:199.90,
estoque:5,
},

{
id:2,
nome:"Camisa Argentina 2022",
descricao:"Modelo inspirado no tricampeonato.",
categoria:"Camisas",
preco:249.90,
estoque:3,
},

{
id:3,
nome:"Boné Copa 2014",
descricao:"Boné comemorativo da Copa do Mundo.",
categoria:"Bonés",
preco:59.90,
estoque:10,
},

{
id:4,
nome:"Jaqueta Alemanha 2014",
descricao:"Jaqueta esportiva edição limitada.",
categoria:"Jaquetas",
preco:299.90,
estoque:4,
},

{
id:5,
nome:"Cachecol França 2018",
descricao:"Cachecol comemorativo do bicampeonato.",
categoria:"Acessórios",
preco:79.90,
estoque:12,
},

{
id:6,
nome:"Chuteira Copa Edition",
descricao:"Modelo colecionável para fãs de futebol.",
categoria:"Chuteiras",
preco:499.90,
estoque:2,
}

];

}

renderizarProdutos(produtos);

}catch(error){

console.error(error);

}

}

function renderizarProdutos(lista){

const container =
document.getElementById("produtos");

container.innerHTML="";

lista.forEach(produto=>{

container.innerHTML += `

<div class="bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition hover:-translate-y-2">

<img
src="${produto.imagem_url}"
onerror="this.src='https://via.placeholder.com/400'"
class="w-full h-56 object-cover">

<div class="p-4">

<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">

${produto.categoria}

</span>

<h3 class="text-xl font-bold mt-3">

${produto.nome}

</h3>

<p class="text-gray-500 mt-2 h-12 overflow-hidden">

${produto.descricao}

</p>

<p class="text-green-700 font-black text-2xl mt-3">

R$ ${Number(produto.preco).toFixed(2)}

</p>

<p class="text-gray-500 text-sm">

Estoque: ${produto.estoque}

</p>

<button
onclick="adicionarCarrinho(${produto.id},'${produto.nome}')"
class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl">

Adicionar ao Carrinho

</button>

</div>

</div>

`;

});

}

function filtrarProdutos(){

const texto =
document
.getElementById("pesquisa")
.value
.toLowerCase();

const filtrados =
produtos.filter(produto=>

produto.nome
.toLowerCase()
.includes(texto)

);

renderizarProdutos(filtrados);

}

async function adicionarCarrinho(id,nome){

try{

await fetch(`${API}/carrinho`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

usuario_id:1,
produto_id:id,
quantidade:1

})

});

}catch(error){

console.log(error);

}

carrinho.push(nome);

atualizarCarrinho();

mostrarToast();

}

function atualizarCarrinho(){

document.getElementById(
"contadorCarrinho"
).innerText = carrinho.length;

const area =
document.getElementById(
"itensCarrinho"
);

area.innerHTML="";

carrinho.forEach(item=>{

area.innerHTML += `

<div class="border-b py-3">

${item}

</div>

`;

});

}

function abrirCarrinho(){

document.getElementById(
"carrinho"
).style.right="0";

}

function fecharCarrinho(){

document.getElementById(
"carrinho"
).style.right="-400px";

}

function mostrarToast(){

const toast =
document.getElementById("toast");

toast.classList.remove("hidden");

setTimeout(()=>{

toast.classList.add("hidden");

},2000);

}

carregarProdutos();

</script>

</body>
</html>
